<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050a" />
      <stop offset="100%" stop-color="#0b0a16" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" rx="8" />
  <rect width="400" height="250" fill="url(#radial-glow)" rx="8" />

  <!-- Grid Pattern -->
  <g opacity="0.08">
    <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" stroke="#ffffff" stroke-width="0.5" />
    <path d="M 40,0 L 40,250 M 80,0 L 80,250 M 120,0 L 120,250 M 160,0 L 160,250 M 200,0 L 200,250 M 240,0 L 240,250 M 280,0 L 280,250 M 320,0 L 320,250 M 360,0 L 360,250" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Network Connections (Dashed paths) -->
  <g opacity="0.3" stroke="#8b5cf6" stroke-width="1.5">
    <line x1="200" y1="125" x2="110" y2="75" stroke-dasharray="4 3" />
    <line x1="200" y1="125" x2="290" y2="75" stroke-dasharray="4 3" />
    <line x1="200" y1="125" x2="290" y2="175" stroke-dasharray="4 3" />
    <line x1="200" y1="125" x2="110" y2="175" stroke-dasharray="4 3" />
  </g>

  <!-- Connection Links Glow -->
  <g opacity="0.5" stroke="#3b82f6" stroke-width="1">
    <line x1="110" y1="75" x2="290" y2="75" />
    <line x1="290" y1="75" x2="290" y2="175" />
    <line x1="290" y1="175" x2="110" y2="175" />
    <line x1="110" y1="175" x2="110" y2="75" />
  </g>

  <!-- Central Agent Core -->
  <circle cx="200" cy="125" r="28" fill="#111122" stroke="url(#glow-grad)" stroke-width="2" filter="url(#glow)" />
  <circle cx="200" cy="125" r="20" fill="url(#glow-grad)" opacity="0.2" />
  <!-- Central Icon (Shield/Security Core) -->
  <path d="M 194,116 L 206,116 L 206,124 Q 206,134 200,138 Q 194,134 194,124 Z" fill="none" stroke="#3b82f6" stroke-width="2" />

  <!-- Node 1: Memory (Top-Left) -->
  <circle cx="110" cy="75" r="14" fill="#0c0714" stroke="#8b5cf6" stroke-width="1.5" />
  <text x="110" y="79" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">M</text>

  <!-- Node 2: Safety Guardrails (Top-Right) -->
  <circle cx="290" cy="75" r="14" fill="#030712" stroke="#3b82f6" stroke-width="1.5" />
  <text x="290" y="79" font-family="monospace" font-size="10" fill="#93c5fd" text-anchor="middle">S</text>

  <!-- Node 3: LLM Model (Bottom-Right) -->
  <circle cx="290" cy="175" r="14" fill="#030712" stroke="#10b981" stroke-width="1.5" />
  <text x="290" y="179" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">AI</text>

  <!-- Node 4: Tools/API (Bottom-Left) -->
  <circle cx="110" cy="175" r="14" fill="#0c0714" stroke="#f59e0b" stroke-width="1.5" />
  <text x="110" y="179" font-family="monospace" font-size="10" fill="#fcd34d" text-anchor="middle">T</text>

  <!-- Decorative Overlay Telemetry -->
  <text x="15" y="25" font-family="monospace" font-size="8" fill="#3b82f6" opacity="0.7">AGENT STATUS: ACTIVE</text>
  <text x="385" y="25" font-family="monospace" font-size="8" fill="#8b5cf6" opacity="0.7" text-anchor="end">SYS_ALIGN: 1.00</text>
  <rect x="15" y="225" width="8" height="8" fill="#10b981" opacity="0.8" />
  <text x="28" y="232" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.6">SECURE CONTEXT</text>
</svg>
