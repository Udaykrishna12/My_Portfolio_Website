<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-rag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03060d" />
      <stop offset="100%" stop-color="#060b1c" />
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad-rag)" rx="8" />
  <rect width="400" height="250" fill="url(#radial-glow)" rx="8" />

  <!-- Flow Lines (Background connection lines) -->
  <g opacity="0.15" stroke="#38bdf8" stroke-width="1.5">
    <path d="M 120,125 L 180,125" />
    <path d="M 230,125 L 290,125" />
    <!-- Dashed link -->
    <path d="M 205,125 L 205,175 L 290,175" stroke-dasharray="3 3" />
  </g>

  <!-- Left: Document Ingestion (Source Files) -->
  <g transform="translate(50, 85)" opacity="0.85">
    <!-- Document Stack -->
    <rect x="0" y="5" width="55" height="75" rx="4" fill="#0b1329" stroke="#1e293b" stroke-width="1.5" />
    <rect x="6" y="0" width="55" height="75" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" />
    <!-- Lines inside document -->
    <line x1="16" y1="18" x2="50" y2="18" stroke="#38bdf8" stroke-width="2" opacity="0.8" />
    <line x1="16" y1="30" x2="44" y2="30" stroke="#334155" stroke-width="1.5" />
    <line x1="16" y1="42" x2="50" y2="42" stroke="#334155" stroke-width="1.5" />
    <line x1="16" y1="54" x2="36" y2="54" stroke="#334155" stroke-width="1.5" />
    
    <text x="33" y="88" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">SOURCE PDF</text>
  </g>

  <!-- Middle: Embedding & Chunking (Vector Transformation) -->
  <g transform="translate(160, 95)" opacity="0.9">
    <rect x="0" y="0" width="55" height="60" rx="6" fill="#0b1528" stroke="#0284c7" stroke-width="1.5" />
    <!-- Text nodes or vector points -->
    <circle cx="18" cy="18" r="3" fill="#38bdf8" />
    <circle cx="38" cy="22" r="3.5" fill="#f59e0b" filter="url(#glow)" />
    <circle cx="24" cy="40" r="3" fill="#38bdf8" />
    <circle cx="42" cy="42" r="2.5" fill="#38bdf8" />
    
    <line x1="18" y1="18" x2="38" y2="22" stroke="#0284c7" stroke-width="0.75" />
    <line x1="24" y1="40" x2="38" y2="22" stroke="#0284c7" stroke-width="0.75" />
    <line x1="24" y1="40" x2="42" y2="42" stroke="#0284c7" stroke-width="0.75" />

    <text x="27" y="78" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">EMBEDDING</text>
  </g>

  <!-- Right: Vector Database Cylinder -->
  <g transform="translate(290, 85)" opacity="0.9">
    <!-- Cylinder Top -->
    <ellipse cx="28" cy="15" rx="28" ry="10" fill="#0284c7" stroke="#38bdf8" stroke-width="1.5" />
    <!-- Cylinder Body -->
    <path d="M 0,15 L 0,65 Q 28,75 56,65 L 56,15 Z" fill="url(#db-grad)" stroke="#38bdf8" stroke-width="1.5" />
    <!-- Cylinder Lines -->
    <ellipse cx="28" cy="38" rx="28" ry="10" fill="none" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="4 3" />
    <ellipse cx="28" cy="62" rx="28" ry="10" fill="none" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="4 3" />

    <text x="28" y="90" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">VECTOR DB</text>
  </g>

  <!-- Magnifying Query Glass scanning Vector Database -->
  <g transform="translate(265, 140)" filter="url(#glow)">
    <circle cx="15" cy="15" r="10" fill="none" stroke="#f59e0b" stroke-width="2" />
    <line x1="22" y1="22" x2="32" y2="32" stroke="#f59e0b" stroke-width="2.5" />
  </g>

  <!-- Technical Overlay Telemetry -->
  <text x="15" y="25" font-family="monospace" font-size="8" fill="#38bdf8" opacity="0.7">PIPELINE: DOCUMENT INGESTION</text>
  <text x="385" y="25" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.7" text-anchor="end">CHUNK_SIZE: 512 tokens</text>
  <text x="15" y="235" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.4">CHROMA VECTOR STORAGE</text>
</svg>
